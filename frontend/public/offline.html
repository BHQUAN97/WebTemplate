<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="robots" content="noindex" />
    <title>Bạn đang offline</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu,
          Cantarell, 'Helvetica Neue', Arial, sans-serif;
        background: #ffffff;
        color: #0a0a0a;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100dvh;
        padding: 1.5rem;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .card {
        width: 100%;
        max-width: 26rem;
        text-align: center;
      }
      .icon {
        width: 72px;
        height: 72px;
        margin: 0 auto 1.25rem;
        border-radius: 9999px;
        background: #f4f4f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        line-height: 1;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin: 0 0 0.5rem;
        letter-spacing: -0.01em;
      }
      p {
        margin: 0 0 1.5rem;
        color: #52525b;
        line-height: 1.55;
        font-size: 0.975rem;
      }
      button {
        appearance: none;
        border: 0;
        cursor: pointer;
        background: #0a0a0a;
        color: #ffffff;
        font: inherit;
        font-weight: 500;
        padding: 0.75rem 1.5rem;
        border-radius: 0.5rem;
        min-width: 9rem;
        transition:
          background-color 150ms ease,
          transform 80ms ease;
      }
      button:hover {
        background: #262626;
      }
      button:active {
        transform: scale(0.98);
      }
      button:focus-visible {
        outline: 2px solid #3b82f6;
        outline-offset: 2px;
      }
      .hint {
        margin-top: 1.25rem;
        font-size: 0.8125rem;
        color: #71717a;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
          color: #fafafa;
        }
        .icon {
          background: #1f1f22;
        }
        p {
          color: #a1a1aa;
        }
        button {
          background: #fafafa;
          color: #0a0a0a;
        }
        button:hover {
          background: #e4e4e7;
        }
        .hint {
          color: #71717a;
        }
      }
    </style>
  </head>
  <body>
    <main class="card" role="main">
      <div class="icon" aria-hidden="true">📡</div>
      <h1>Bạn đang offline</h1>
      <p>Kiểm tra kết nối và thử lại.</p>
      <button type="button" onclick="location.reload()">Thử lại</button>
      <p class="hint">Một số nội dung đã lưu có thể vẫn truy cập được.</p>
    </main>
  </body>
</html>
