<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background for maskable purpose; content stays inside 80% safe zone -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <!-- Safe zone: 80% center (content area 410x410 around center 256,256) -->
  <!-- Brand initial (W) centered, white, bold — sized so it fits within 80% safe circle -->
  <text
    x="256"
    y="256"
    text-anchor="middle"
    dominant-baseline="central"
    font-family="Arial, Helvetica, 'Segoe UI', sans-serif"
    font-weight="900"
    font-size="240"
    fill="#FFFFFF"
    letter-spacing="-6"
  >W</text>
</svg>
