##############################################
# WebTemplate — Shared VPS Configuration
#
# Dung khi VPS chay NHIEU project chung:
# - Shared MySQL instance (nhieu database)
# - Shared Redis instance (key prefix)
# - Shared Nginx (nhieu domain)
# - External Docker network
#
# Prerequisites:
#   1. Tao shared network: docker network create shared-net
#   2. MySQL + Redis da chay (docker-compose.shared-infra.yml)
#   3. Tao database:
#      docker exec shared-mysql mysql -u root -p -e "CREATE DATABASE webtemplate;"
#      docker exec shared-mysql mysql -u root -p -e "GRANT ALL ON webtemplate.* TO 'wtuser'@'%' IDENTIFIED BY 'wtpass';"
#
# Usage: docker compose -f docker-compose.shared-vps.yml up -d
##############################################

version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-unknown}
    container_name: wt-backend
    restart: unless-stopped
    env_file:
      - ./.env.production
    # KHONG expose port ra ngoai — chi noi bo qua nginx
    expose:
      - "6001"
    environment:
      NODE_ENV: production
      # Ket noi shared MySQL qua Docker network
      DB_HOST: shared-mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-webtemplate}
      DB_USER: ${DB_USER:-wtuser}
      DB_PASSWORD: ${DB_PASSWORD:-wtpass}
      # Ket noi shared Redis — dung key prefix de isolate
      REDIS_HOST: shared-redis
      REDIS_PORT: 6379
      REDIS_PREFIX: "wt:"
      # App config
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      APP_NAME: ${APP_NAME:-WebTemplate}
      APP_URL: https://${DOMAIN}
      API_URL: https://${DOMAIN}/api
      APP_PORT: 6001
      CORS_ORIGINS: https://${DOMAIN},https://www.${DOMAIN}
      # Storage
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION:-auto}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      # Email
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - shared-net
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:6001/api']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
        APP_VERSION: ${APP_VERSION:-unknown}
    container_name: wt-frontend
    restart: unless-stopped
    env_file:
      - ./.env.production
    expose:
      - "6000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - shared-net
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:6000']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  uploads_data:
    driver: local

networks:
  shared-net:
    external: true
