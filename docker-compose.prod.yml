# ============================================
# WebTemplate — PRODUCTION (Shared VPS)
# Domain: template.bhquan.store
# Dung chung MySQL (shared-mysql), Redis (shared-redis), Nginx (shared-nginx)
# tu /opt/infra/docker-compose.yml
# ============================================

services:

  # ─── NestJS Backend ──────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wt-backend
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      APP_PORT: 6001
      DB_HOST: shared-mysql
      DB_PORT: 3306
      DB_NAME: webtemplate
      DB_USER: webtemplate
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: shared-redis
      REDIS_PORT: 6379
      REDIS_PREFIX: "wt:"
      APP_URL: https://template.bhquan.store
      API_URL: https://template.bhquan.store/api
      CORS_ORIGINS: https://template.bhquan.store
    ports:
      - '127.0.0.1:6001:6001'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:6001/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 768M
    networks:
      - webphoto_backend
      - webtemplate_frontend

  # ─── Next.js Frontend ────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
        APP_VERSION: ${APP_VERSION:-latest}
    container_name: wt-frontend
    restart: always
    ports:
      - '127.0.0.1:6000:6000'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_SITE_URL: https://template.bhquan.store
      INTERNAL_API_URL: http://wt-backend:6001/api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:6000 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '0.75'
          memory: 768M
    networks:
      - webtemplate_frontend

networks:
  # Network rieng — shared-nginx join vao de proxy
  webtemplate_frontend:
    name: webtemplate_frontend
    external: true
  # Network chung — truy cap shared-mysql + shared-redis
  webphoto_backend:
    name: webphoto_backend
    external: true
