# ──────────────────────────────────────────
# WebTemplate — Nginx config cho shared-nginx
# Domain: template.bhquan.store
# Dung resolver + set $var de nginx khong crash khi container chua up
# ──────────────────────────────────────────

server {
    listen 80;
    server_name template.bhquan.store;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name template.bhquan.store;

    ssl_certificate     /etc/letsencrypt/live/template.bhquan.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/template.bhquan.store/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Docker DNS resolver — dynamic resolution, nginx khong crash khi container chua up
    resolver 127.0.0.11 valid=30s ipv6=off;

    client_max_body_size 50m;

    # ─── API → NestJS backend ────────────────
    location /api/ {
        set $wt_api http://wt-backend:6001;
        proxy_pass $wt_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
    }

    # ─── Next.js static assets (immutable) ──
    location /_next/static/ {
        set $wt_fe http://wt-frontend:6000;
        proxy_pass $wt_fe;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Frontend SSR → Next.js ──────────────
    location / {
        set $wt_fe http://wt-frontend:6000;
        proxy_pass $wt_fe;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
