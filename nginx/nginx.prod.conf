# ============================================================================
# WebTemplate — Production Nginx config
#
# WARNING: Bien ${DOMAIN} KHONG duoc tu dong substitute boi nginx.
#   Co 2 cach xu ly:
#   (1) Rename file thanh default.conf.template, dat trong nginx/templates/,
#       mount vao `/etc/nginx/templates/` cua official nginx image.
#       Image se tu chay envsubst khi start (xem nginx/templates/ trong repo).
#   (2) Hoac replace thu cong ${DOMAIN} truoc khi mount:
#       `envsubst '${DOMAIN}' < nginx.prod.conf > nginx.rendered.conf`
#   File nay giu nguyen placeholder lam REFERENCE.
# ============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml application/xml+rss
               image/svg+xml font/woff font/woff2;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Upstream — dung Docker service name
    upstream wt_frontend {
        server wt-frontend:6000;
    }
    upstream wt_backend {
        server wt-backend:6001;
    }

    # ======================
    # HTTP → HTTPS redirect
    # ======================
    server {
        listen 80;
        server_name ${DOMAIN} www.${DOMAIN};

        # Certbot challenge — giu HTTP cho ACME validation
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Tat ca route khac → redirect sang HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ======================
    # HTTPS main server
    # Require valid certs. Use: certbot --nginx -d ${DOMAIN} -d www.${DOMAIN}
    # Default certbot path: /etc/letsencrypt/live/${DOMAIN}/
    # ======================
    server {
        listen 443 ssl http2;
        server_name ${DOMAIN} www.${DOMAIN};

        # SSL certs — tu Certbot (default letsencrypt path)
        ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

        # SSL settings — modern profile (TLS 1.2+)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers
        # Chu y: KHONG dung X-XSS-Protection (deprecated, gay XSS bug tren Chrome cu)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        # Content Security Policy — tam cho 'unsafe-inline' cho Next.js inline scripts/styles.
        # Production hardening: chuyen sang nonce-based CSP khi Next.js CSP plugin on sau.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none';" always;

        # API → Backend
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://wt_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Login rate limiting
        location /api/auth/login {
            limit_req zone=login burst=3 nodelay;
            proxy_pass http://wt_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Uploaded files
        location /uploads/ {
            alias /var/www/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Static assets cache
        location /_next/static/ {
            proxy_pass http://wt_frontend;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(ico|css|js|gif|jpeg|jpg|png|webp|woff|woff2|ttf|svg|eot)$ {
            proxy_pass http://wt_frontend;
            expires 30d;
            add_header Cache-Control "public";
        }

        # All other → Frontend
        location / {
            proxy_pass http://wt_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        error_page 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
