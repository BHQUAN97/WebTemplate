# Deploy workflow — SSH into VPS using password auth, git pull, run ./deploy.sh <env>
#
# Required GitHub repository secrets:
#   VPS_HOST     — hostname or IP of the target server
#   VPS_PORT     — SSH port (e.g. 22)
#   VPS_USER     — SSH user on the server (e.g. root)
#   VPS_PASSWORD — SSH password
#   DEPLOY_PATH  — absolute path on server where repo is checked out
#
# Trigger:
#   - Manual: Actions -> Deploy -> Run workflow -> pick environment
#   - Automatic: push a tag matching v* (e.g. v1.2.3) -> deploys to prod

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - prod
  push:
    tags:
      - 'v*'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'prod' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=prod" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV

      - name: Deploy over SSH
        env:
          TARGET_ENV: ${{ steps.env.outputs.target }}
        run: |
          sshpass -e ssh -p "${{ secrets.VPS_PORT }}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "set -euo pipefail; \
             cd '${{ secrets.DEPLOY_PATH }}' && \
             git fetch --all --prune && \
             git reset --hard '${{ github.sha }}' && \
             ./deploy.sh '$TARGET_ENV'"
