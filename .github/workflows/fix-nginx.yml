name: Fix Nginx (Emergency)

on:
  workflow_dispatch:

env:
  INFRA_DIR: /opt/infra

jobs:
  fix:
    name: "Recreate shared-nginx"
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.VPS_PORT }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV

      - name: Diagnose
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"

          echo "=== All containers ==="
          sshpass -e ssh -p $PORT $VPS "docker ps -a --format 'table {{.Names}}\t{{.Status}}'"

          echo ""
          echo "=== Docker networks ==="
          sshpass -e ssh -p $PORT $VPS "docker network ls --format '{{.Name}}' | grep -v 'bridge\|host\|none'"

          echo ""
          echo "=== Certs in webphoto_certbot_data ==="
          sshpass -e ssh -p $PORT $VPS "
            docker run --rm -v webphoto_certbot_data:/etc/letsencrypt alpine ls /etc/letsencrypt/live/ 2>&1 || echo 'volume missing'
          "

      - name: Recreate shared-nginx (docker run with correct cert volume)
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"

          echo "=== Remove stale container ==="
          sshpass -e ssh -p $PORT $VPS "docker rm -f shared-nginx 2>/dev/null || echo 'Already gone'"

          echo ""
          echo "=== Ensure static dir exists ==="
          sshpass -e ssh -p $PORT $VPS "mkdir -p /opt/webphoto/photo-storage/dist"

          echo ""
          echo "=== Start nginx with webphoto_certbot_data (real LE certs) ==="
          sshpass -e ssh -p $PORT $VPS "
            docker run -d \
              --name shared-nginx \
              --restart always \
              -p 80:80 \
              -p 443:443 \
              -v ${INFRA_DIR}/nginx/nginx.conf:/etc/nginx/nginx.conf:ro \
              -v ${INFRA_DIR}/nginx/conf.d:/etc/nginx/conf.d:ro \
              -v /opt/webphoto/photo-storage/dist:/usr/share/nginx/html:ro \
              -v webphoto_certbot_data:/etc/letsencrypt:ro \
              -v certbot_webroot:/var/www/certbot:ro \
              --network webphoto_backend \
              nginx:1.27-alpine 2>&1
          "

          sleep 8

          echo ""
          echo "=== nginx status ==="
          sshpass -e ssh -p $PORT $VPS "
            docker inspect shared-nginx --format 'Status: {{.State.Status}} | Running: {{.State.Running}}' 2>&1
            docker logs shared-nginx --tail 10 2>&1 || true
          "

      - name: Connect nginx to project networks + reload
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"

          sshpass -e ssh -p $PORT $VPS "
            docker network connect webphoto_frontend shared-nginx 2>/dev/null || echo 'webphoto_frontend: already connected or missing'
            docker network connect lqd_frontend shared-nginx 2>/dev/null || echo 'lqd_frontend: already connected or missing'
            docker network connect fashionecom_fashionecom-net shared-nginx 2>/dev/null || echo 'fashionecom_fashionecom-net: already connected or missing'
            echo ''
            echo 'Networks nginx is on:'
            docker inspect shared-nginx --format '{{range \$k, \$v := .NetworkSettings.Networks}}{{\$k}} {{end}}' 2>&1
          "

          echo ""
          echo "=== nginx config test + reload ==="
          sshpass -e ssh -p $PORT $VPS "
            docker exec shared-nginx nginx -t 2>&1
            docker exec shared-nginx nginx -s reload 2>&1 || true
          "

      - name: Test all sites
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ secrets.VPS_PORT }}"

          sleep 5

          sshpass -e ssh -p $PORT $VPS "
            echo -n 'bhquan.site:           '; curl -sk -o /dev/null -w '%{http_code}\n' https://bhquan.site/
            echo -n 'lqd.bhquan.store:      '; curl -sk -o /dev/null -w '%{http_code}\n' https://lqd.bhquan.store/
            echo -n 'template.bhquan.store: '; curl -sk -o /dev/null -w '%{http_code}\n' https://template.bhquan.store/
            echo -n 'shop.bhquan.store:     '; curl -sk -o /dev/null -w '%{http_code}\n' https://shop.bhquan.store/
          "
