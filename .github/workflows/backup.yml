name: Daily Backup WebTemplate

on:
  schedule:
    - cron: '12 19 * * *'
  workflow_dispatch:

env:
  APP_DIR: /opt/webtemplate
  KEEP_DAYS: 7
  DB_NAME: webtemplate
  DB_USER: webtemplate
  BACKUP_BRANCH: backups
  GDRIVE_ENABLED: ${{ secrets.GDRIVE_FOLDER_ID != '' && 'true' || 'false' }}

permissions:
  contents: write

jobs:
  backup:
    name: Backup DB + Uploads
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq sshpass > /dev/null
          mkdir -p ~/.ssh
          VPS_PORT="${{ secrets.VPS_PORT }}"
          VPS_PORT="${VPS_PORT:-22}"
          ssh-keyscan -p $VPS_PORT -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "SSHPASS=${{ secrets.VPS_PASSWORD }}" >> $GITHUB_ENV
          echo "DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          echo "SSH_PORT=${VPS_PORT}" >> $GITHUB_ENV

      - name: Create backups on VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ env.SSH_PORT }}"
          DATE="${{ env.DATE }}"

          sshpass -e ssh -p $PORT $VPS "
            set -e
            BACKUP_DIR=/tmp/backup-webtemplate-${DATE}
            rm -rf \$BACKUP_DIR
            mkdir -p \$BACKUP_DIR

            DB_PWD=\$(grep '^DB_PASSWORD=' ${APP_DIR}/.env 2>/dev/null | cut -d= -f2-)
            if [ -z \"\$DB_PWD\" ]; then
              echo 'ERROR: DB_PASSWORD not found in ${APP_DIR}/.env'
              exit 1
            fi

            echo '=== MySQL check ==='
            if ! docker exec shared-mysql mysqladmin ping -h localhost --silent 2>/dev/null; then
              echo 'ERROR: shared-mysql not responding'
              docker logs shared-mysql --tail 20 2>&1 || true
              exit 1
            fi
            if ! docker exec -e MYSQL_PWD=\"\$DB_PWD\" shared-mysql mysql -u ${DB_USER} ${DB_NAME} -e 'SELECT 1' >/dev/null 2>&1; then
              echo 'ERROR: Cannot connect as ${DB_USER}@${DB_NAME}'
              exit 1
            fi
            echo 'MySQL: OK (user=${DB_USER})'

            echo ''
            echo '=== Database dump: ${DB_NAME} ==='
            docker exec -e MYSQL_PWD=\"\$DB_PWD\" shared-mysql mysqldump \
              -u ${DB_USER} \
              --single-transaction --routines --triggers \
              ${DB_NAME} > /tmp/dump_webtemplate.sql 2>/tmp/dump_webtemplate_err.txt \
              || { echo 'MYSQLDUMP FAILED:'; cat /tmp/dump_webtemplate_err.txt; rm -f /tmp/dump_webtemplate_err.txt /tmp/dump_webtemplate.sql; exit 1; }
            rm -f /tmp/dump_webtemplate_err.txt
            gzip -c /tmp/dump_webtemplate.sql > \$BACKUP_DIR/${DB_NAME}.sql.gz
            rm -f /tmp/dump_webtemplate.sql
            echo \"  DB: \$(du -h \$BACKUP_DIR/${DB_NAME}.sql.gz | cut -f1)\"

            echo ''
            echo '=== Upload archives ==='
            UPLOADS_PATH=\$(docker inspect wt-backend --format '{{range .Mounts}}{{if eq .Destination \"/app/uploads\"}}{{.Source}}{{end}}{{end}}' 2>/dev/null || echo '')
            if [ -n \"\$UPLOADS_PATH\" ] && [ -d \"\$UPLOADS_PATH\" ] && [ \"\$(ls -A \$UPLOADS_PATH 2>/dev/null)\" ]; then
              echo \"Uploads path: \$UPLOADS_PATH\"
              FILE_COUNT=\$(find \$UPLOADS_PATH -type f | wc -l)
              echo \"  Files: \$FILE_COUNT\"
              if [ \"\$FILE_COUNT\" -gt 0 ]; then
                if command -v zip >/dev/null 2>&1; then
                  cd \$UPLOADS_PATH && zip -rq \$BACKUP_DIR/uploads.zip . && cd /
                else
                  tar czf \$BACKUP_DIR/uploads.tar.gz -C \$UPLOADS_PATH .
                fi
                ARCHIVE=\$(find \$BACKUP_DIR -name 'uploads.*' -type f | head -1)
                echo \"  Uploads: \$(du -h \$ARCHIVE | cut -f1)\"
              fi
            else
              echo 'No uploads found (skip)'
            fi

            echo ''
            echo '=== Verify backups ==='
            VERIFY_FAIL=0
            for gz in \$(find \$BACKUP_DIR -name '*.sql.gz'); do
              if gunzip -t \"\$gz\" 2>/dev/null; then
                SIZE=\$(stat -c%s \"\$gz\")
                if [ \"\$SIZE\" -lt 100 ]; then
                  echo \"FAIL: \$(basename \$gz) too small\"
                  VERIFY_FAIL=1
                else
                  echo \"OK: \$(basename \$gz) (\$(du -h \$gz | cut -f1))\"
                fi
              else
                echo \"FAIL: \$(basename \$gz) corrupt\"
                VERIFY_FAIL=1
              fi
            done
            for z in \$(find \$BACKUP_DIR -name '*.zip' -o -name '*.tar.gz' | grep -v '.sql.gz'); do
              if echo \"\$z\" | grep -q '.zip\$'; then
                unzip -tq \"\$z\" > /dev/null 2>&1 && echo \"OK: \$(basename \$z) (\$(du -h \$z | cut -f1))\" || { echo \"FAIL: \$(basename \$z) corrupt\"; VERIFY_FAIL=1; }
              elif echo \"\$z\" | grep -q '.tar.gz\$'; then
                tar tzf \"\$z\" > /dev/null 2>&1 && echo \"OK: \$(basename \$z) (\$(du -h \$z | cut -f1))\" || { echo \"FAIL: \$(basename \$z) corrupt\"; VERIFY_FAIL=1; }
              fi
            done
            [ \$VERIFY_FAIL -eq 0 ] || { echo 'ERROR: Verification failed!'; exit 1; }

            echo ''
            echo '=== All backup files ==='
            find \$BACKUP_DIR -type f -exec ls -lh {} \;
          "

      - name: Download backups from VPS
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ env.SSH_PORT }}"
          DATE="${{ env.DATE }}"
          mkdir -p /tmp/backups
          sshpass -e scp -P $PORT -r $VPS:/tmp/backup-webtemplate-${DATE}/* /tmp/backups/
          echo "Downloaded:"; find /tmp/backups -type f -exec ls -lh {} \;

      - name: Upload to Google Drive
        if: env.GDRIVE_ENABLED == 'true'
        continue-on-error: true
        run: |
          DATE="${{ env.DATE }}"
          FOLDER_ID="${{ secrets.GDRIVE_FOLDER_ID }}"
          CREDS='${{ secrets.GDRIVE_CREDENTIALS_JSON }}'
          KEEP=${{ env.KEEP_DAYS }}

          echo "$CREDS" > /tmp/gdrive-creds.json

          cd /tmp && npm init -y --silent > /dev/null 2>&1
          npm install googleapis@144 --silent > /dev/null 2>&1

          node -e "
          const { google } = require('googleapis');
          const fs = require('fs');
          const path = require('path');

          async function main() {
            const creds = JSON.parse(fs.readFileSync('/tmp/gdrive-creds.json', 'utf8'));
            const auth = new google.auth.JWT({
              email: creds.client_email,
              key: creds.private_key,
              scopes: ['https://www.googleapis.com/auth/drive.file'],
            });
            await auth.authorize();
            const drive = google.drive({ version: 'v3', auth });
            console.log('GDrive auth OK:', creds.client_email);

            const parentId = '${FOLDER_ID}';
            const subName = 'webtemplate-backup';
            let subId;
            const list = await drive.files.list({
              q: \"'\" + parentId + \"' in parents and name = '\" + subName + \"' and mimeType = 'application/vnd.google-apps.folder' and trashed = false\",
              fields: 'files(id)',
            });
            if (list.data.files && list.data.files.length > 0) {
              subId = list.data.files[0].id;
            } else {
              const created = await drive.files.create({
                requestBody: { name: subName, mimeType: 'application/vnd.google-apps.folder', parents: [parentId] },
                fields: 'id',
              });
              subId = created.data.id;
              console.log('Created folder:', subName);
            }

            const backupDir = '/tmp/backups';
            const files = fs.readdirSync(backupDir);
            for (const fname of files) {
              const fpath = path.join(backupDir, fname);
              const stat = fs.statSync(fpath);
              const uploadName = '${DATE}_' + fname;
              const sizeMB = (stat.size / 1024 / 1024).toFixed(2);
              console.log('Uploading:', uploadName, '(' + sizeMB + ' MB)');
              await drive.files.create({
                requestBody: { name: uploadName, parents: [subId] },
                media: { body: fs.createReadStream(fpath) },
                fields: 'id, name',
              });
              console.log('  OK:', uploadName);
            }

            const allFiles = await drive.files.list({
              q: \"'\" + subId + \"' in parents and trashed = false\",
              fields: 'files(id, name, createdTime)',
              orderBy: 'createdTime desc',
              pageSize: 200,
            });
            const maxFiles = ${KEEP} * 3;
            const toDelete = (allFiles.data.files || []).slice(maxFiles);
            if (toDelete.length > 0) {
              console.log('Rotating:', toDelete.length, 'old files');
              for (const f of toDelete) {
                await drive.files.delete({ fileId: f.id });
              }
            }

            console.log('GDrive backup complete');
          }
          main().catch(e => { console.error('GDrive error:', e.message); process.exit(1); });
          "

          rm -f /tmp/gdrive-creds.json
          echo "Google Drive: OK"

      - name: Encrypt backups
        run: |
          ENCRYPT_KEY="${{ secrets.BACKUP_ENCRYPT_KEY }}"
          if [ -z "$ENCRYPT_KEY" ]; then
            echo "WARNING: BACKUP_ENCRYPT_KEY not set, skipping encryption"
            exit 0
          fi
          for f in $(find /tmp/backups -type f \( -name '*.sql.gz' -o -name '*.zip' -o -name '*.tar.gz' \)); do
            gpg --batch --yes --passphrase "${ENCRYPT_KEY}" \
              --symmetric --cipher-algo AES256 "$f"
            rm -f "$f"
            echo "Encrypted: $(basename "$f").gpg"
          done
          find /tmp/backups -type f -exec ls -lh {} \;

      - name: Push to backups branch
        run: |
          DATE="${{ env.DATE }}"
          git fetch origin ${{ env.BACKUP_BRANCH }} 2>/dev/null || true
          if git rev-parse origin/${{ env.BACKUP_BRANCH }} >/dev/null 2>&1; then
            git checkout ${{ env.BACKUP_BRANCH }}
          else
            git checkout --orphan ${{ env.BACKUP_BRANCH }}
            git rm -rf . > /dev/null 2>&1 || true
            cat > README.md << 'READMEEOF'
          # WebTemplate Backups

          Daily backups. Encrypted with AES-256 if BACKUP_ENCRYPT_KEY is set.

          Decrypt: gpg --decrypt --output FILE FILE.gpg

          Structure: webtemplate/YYYY-MM-DD/{webtemplate.sql.gz, uploads.zip}
          READMEEOF
            git add README.md
          fi

          mkdir -p "webtemplate/${DATE}"
          cp /tmp/backups/* "webtemplate/${DATE}/" 2>/dev/null || true

          CUTOFF=$(date -d "${{ env.KEEP_DAYS }} days ago" +%Y-%m-%d)
          for dir in webtemplate/*/; do
            DIRNAME=$(basename "$dir")
            if [[ "$DIRNAME" < "$CUTOFF" ]]; then
              echo "Removing old: $dir"
              rm -rf "$dir"
            fi
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "backup: webtemplate ${DATE}"
            git push origin ${{ env.BACKUP_BRANCH }}
          fi

      - name: Diagnose on failure
        if: failure()
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ env.SSH_PORT }}"
          sshpass -e ssh -p $PORT $VPS "
            echo '=== Container status ==='
            docker ps -a --format 'table {{.Names}}\t{{.Status}}\t{{.RestartCount}}' | grep -E 'wt-|shared-' || true
            echo ''
            echo '=== MySQL logs (last 20) ==='
            docker logs shared-mysql --tail 20 2>&1 || echo 'shared-mysql: not found'
            echo ''
            echo '=== Disk / Memory ==='
            df -h / | tail -1; free -h | head -2
          " 2>/dev/null || echo '::warning::Cannot SSH to VPS for diagnostics'

      - name: Cleanup VPS temp
        if: always()
        run: |
          VPS="${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}"
          PORT="${{ env.SSH_PORT }}"
          sshpass -e ssh -p $PORT $VPS "rm -rf /tmp/backup-webtemplate-* /tmp/dump_webtemplate*.sql /tmp/dump_webtemplate_err.txt" 2>/dev/null || true

      - name: Summary
        run: |
          echo "==============================="
          echo "Backup OK: ${{ env.DATE }}"
          echo "Repo: WebTemplate | DB: ${{ env.DB_NAME }}"
          echo "Storage 1: GitHub branch '${{ env.BACKUP_BRANCH }}' (${KEEP_DAYS}d retention)"
          echo "Storage 2: Google Drive (${{ env.GDRIVE_ENABLED == 'true' && 'enabled' || 'not configured' }})"
          echo "==============================="
